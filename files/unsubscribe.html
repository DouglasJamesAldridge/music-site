<!-- templates/unsubscribe.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unsubscribe</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <main class="container">
    <header class="hero">
      {% if success %}
        <p class="eyebrow">Done</p>
        <h1 class="headline" style="font-size: 2.2rem;">You're unsubscribed.</h1>
        <p class="subline">You won't receive any more emails. Take care.</p>
      {% else %}
        <p class="eyebrow">Hmm</p>
        <h1 class="headline" style="font-size: 2.2rem;">Link not found.</h1>
        <p class="subline">This unsubscribe link is invalid or has already been used.</p>
      {% endif %}
    </header>
    <a href="/" style="font-size: 0.85rem; color: var(--text-muted); text-decoration: none; border-bottom: 1px solid var(--border);">
      ← Back to site
    </a>
  </main>
</body>
</html>
